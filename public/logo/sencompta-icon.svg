<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 264" width="264" height="264" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="silverI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#dfe3e8"/>
      <stop offset="45%"  stop-color="#aab2bb"/>
      <stop offset="58%"  stop-color="#7c858f"/>
      <stop offset="72%"  stop-color="#b3bac2"/>
      <stop offset="100%" stop-color="#5e6670"/>
    </linearGradient>
    <linearGradient id="goldI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f6e08a"/>
      <stop offset="45%"  stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#8a6c12"/>
    </linearGradient>
    <linearGradient id="navyI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2540"/>
      <stop offset="100%" stop-color="#0d1322"/>
    </linearGradient>
    <filter id="dropI" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- fond carré navy arrondi -->
  <rect x="6" y="6" width="252" height="252" rx="52" ry="52" fill="url(#navyI)"/>
  <!-- bordure dorée -->
  <rect x="6" y="6" width="252" height="252" rx="52" ry="52" fill="none" stroke="url(#goldI)" stroke-width="7"/>
  <rect x="15" y="15" width="234" height="234" rx="45" ry="45" fill="none" stroke="#8a6c12" stroke-width="1.5" opacity="0.55"/>

  <!-- SC métal centré -->
  <g filter="url(#dropI)">
    <text x="100" y="172" font-size="135" font-weight="700"
          fill="url(#silverI)" stroke="#3f464f" stroke-width="1.5"
          text-anchor="middle">S</text>
    <text x="172" y="172" font-size="135" font-weight="700"
          fill="url(#silverI)" stroke="#3f464f" stroke-width="1.5"
          text-anchor="middle">C</text>
  </g>
</svg>
