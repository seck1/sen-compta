<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SenCompta — Logo Koniq Style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f0f0;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 60px;
    padding: 60px 20px;
  }
  .label {
    font-size: 10px;
    color: #aaa;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .bg-white { background: #fff; padding: 50px 70px; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); }
  .bg-dark  { background: #0d1b2a; padding: 50px 70px; border-radius: 20px; }

  .logo {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Icône carrée arrondie */
  .icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(145deg, #c9a227, #a07c10);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #111;
  }

  .wordmark-white {
    font-family: 'Inter', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
  }

  /* Taille navbar */
  .logo-sm { display: flex; align-items: center; gap: 12px; }
  .icon-sm { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(145deg, #c9a227, #a07c10); display: flex; align-items: center; justify-content: center; }
  .wordmark-sm { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
</style>
</head>
<body>

<!-- VERSION 1 : SC stylisé géométrique -->
<div class="card">
  <div class="label">V1 — SC géométrique (style Koniq)</div>
  <div class="bg-white">
    <div class="logo">
      <div class="icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- S -->
          <path d="M8 11 Q8 7 13 7 L20 7 Q25 7 25 12 Q25 17 18 18 Q25 19 25 24 Q25 29 20 29 L13 29 Q8 29 8 25"
                fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
          <!-- C -->
          <path d="M29 13 Q27 8 22 9" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
      <span class="wordmark">SenCompta</span>
    </div>
  </div>
</div>

<!-- VERSION 2 : SC lettres bold simples -->
<div class="card">
  <div class="label">V2 — SC lettres bold</div>
  <div class="bg-white">
    <div class="logo">
      <div class="icon">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="4" y="29" font-family="'Inter', sans-serif" font-size="26" font-weight="900" fill="white" letter-spacing="-1">SC</text>
        </svg>
      </div>
      <span class="wordmark">SenCompta</span>
    </div>
  </div>
</div>

<!-- VERSION 3 : S stylisé + C en négatif -->
<div class="card">
  <div class="label">V3 — Monogramme S+C fusionné</div>
  <div class="bg-white">
    <div class="logo">
      <div class="icon" style="background: linear-gradient(145deg, #0d1b2a, #1a3252);">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- S bold -->
          <path d="M10 13 Q10 8 16 8 L22 8 Q28 8 28 14 Q28 19 19 19 Q28 19 28 25 Q28 30 22 30 L16 30 Q10 30 10 25"
                fill="none" stroke="#c9a227" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="wordmark">SenCompta</span>
    </div>
  </div>
</div>

<!-- VERSION 4 : Icône navy + or — fond sombre -->
<div class="card">
  <div class="label">V4 — Sur fond sombre (navbar)</div>
  <div class="bg-dark">
    <div class="logo">
      <div class="icon" style="background: linear-gradient(145deg, #c9a227, #a07c10);">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="4" y="29" font-family="'Inter', sans-serif" font-size="26" font-weight="900" fill="#0d1b2a" letter-spacing="-1">SC</text>
        </svg>
      </div>
      <span class="wordmark-white">SenCompta</span>
    </div>
  </div>
</div>

<!-- VERSION 5 : Icône verte — style fintech -->
<div class="card">
  <div class="label">V5 — Fintech vert</div>
  <div class="bg-white">
    <div class="logo">
      <div class="icon" style="background: linear-gradient(145deg, #059669, #047857);">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="4" y="29" font-family="'Inter', sans-serif" font-size="26" font-weight="900" fill="white" letter-spacing="-1">SC</text>
        </svg>
      </div>
      <span class="wordmark">SenCompta</span>
    </div>
  </div>
</div>

<!-- NAVBAR COMPACTE -->
<div class="card">
  <div class="label">Navbar compacte</div>
  <div class="bg-dark" style="padding: 20px 40px;">
    <div class="logo-sm">
      <div class="icon-sm">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="2" y="20" font-family="'Inter', sans-serif" font-size="17" font-weight="900" fill="#0d1b2a" letter-spacing="-1">SC</text>
        </svg>
      </div>
      <span class="wordmark-sm">SenCompta</span>
    </div>
  </div>
</div>

</body>
</html>
