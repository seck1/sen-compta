<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SenCompta — Logo Simple</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
    background: #f5f5f5;
    font-family: 'Inter', sans-serif;
  }

  .label {
    font-size: 10px;
    color: #aaa;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
    text-align: center;
  }

  /* ── VERSION SOMBRE ── */
  .bg-dark {
    background: #0d1b2a;
    padding: 60px 80px;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* ── VERSION CLAIRE ── */
  .bg-light {
    background: #ffffff;
    padding: 60px 80px;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.08);
  }

  /* ── LOGO ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .badge {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2.5px solid #c9a227;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .badge span {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 28px;
    font-weight: 700;
    color: #c9a227;
    letter-spacing: 3px;
  }

  .name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1;
  }

  .name.on-dark { color: #ffffff; }
  .name.on-light { color: #0d1b2a; }

  /* ── NAVBAR ── */
  .logo-sm {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .badge-sm {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid #c9a227;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .badge-sm span {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: #c9a227;
    letter-spacing: 2px;
  }
  .name-sm {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
  }

  /* ── FAVICON ── */
  .favicon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #c9a227;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .favicon span {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #0d1b2a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <!-- Fond sombre -->
  <div>
    <div class="label">Fond sombre</div>
    <div class="bg-dark">
      <div class="logo">
        <div class="badge"><span>SC</span></div>
        <span class="name on-dark">SenCompta</span>
      </div>
    </div>
  </div>

  <!-- Fond blanc -->
  <div>
    <div class="label">Fond blanc</div>
    <div class="bg-light">
      <div class="logo">
        <div class="badge"><span>SC</span></div>
        <span class="name on-light">SenCompta</span>
      </div>
    </div>
  </div>

  <!-- Navbar compacte -->
  <div>
    <div class="label">Navbar</div>
    <div class="bg-dark" style="padding: 24px 40px;">
      <div class="logo-sm">
        <div class="badge-sm"><span>SC</span></div>
        <span class="name-sm">SenCompta</span>
      </div>
    </div>
  </div>

  <!-- Favicon -->
  <div>
    <div class="label">Favicon / Icône app</div>
    <div class="favicon"><span>SC</span></div>
  </div>

</body>
</html>
